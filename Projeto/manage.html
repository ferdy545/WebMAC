<!DOCTYPE html>

<html lang="pt">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>BagulhoRank</title>

        <link rel="stylesheet" href="styles.css">
    </head>

    <body>

        <header>

            <div>
                <h1>BagulhoRank™</h1>
                <p>Um classificador de bagulhos completamente inútil</p>
            </div>

            <nav>
                <a href="index.html" class="button">Escolha</a>
                <a href="manage.html" class="button">Bagulhos</a>
            </nav>

        </header>

        <main class="main-B">
            <div class="form">
                <h3>Novo Bagulho</h3>
                <input type="text" maxlength="64" placeholder="Nome">
                <input type="text" maxlength="48" placeholder="Categoria">
                <input type="text"                placeholder="URL da imagem">
                <button>Adicionar</button>
            </div>

            <div class="card-list">

                <div class="card-B">
                    <div
                        class="card-rank-position"
                        style="font-family:Verdana, Geneva, Tahoma, sans-serif; font-weight: bold;">
                        # 1
                    </div>

                    <button class="delete-card-button">
                        <img src="trashbin.png">
                    </button>

                    <div class="card-header-B">
                        <h2>Bagulho X</h2>
                        <p>Categoria x</p>
                    </div>

                    <p>BagulhoScore:</p>
                    <div class="card-score">100000000</div>
                    <img src="placeholder.png">
                    
                </div>

                <div class="card-B">
                    <div
                        class="card-rank-position"
                        style="font-family:Verdana, Geneva, Tahoma, sans-serif; font-weight: bold;">
                        # 100
                    </div>

                    <button class="delete-card-button">
                        <img src="trashbin.png">
                    </button>

                    <div class="card-header-B">
                        <h2>Bagulho Y</h2>
                        <p>Categoria y</p>
                    </div>

                    <p>BagulhoScore:</p>
                    <div class="card-score">0</div>
                    <img src="placeholder.png">
                    
                </div>

            </div>

        </main>

        <footer>© 2026 BagulhoRank, powered by BagulhoScore™. Nenhum direito reservado.</footer>

    </body>

</html>
