<div>
    <input type="text" 
        name="busca" 
        placeholder="Buscar..."
        hx-get="/lista"
        hx-trigger="input changed delay:500ms"
        hx-target="#lista"
        hx-select="#lista"
        hx-indicator="#indicator"
        hx-vals='{"pagina": 1, "limite": 10}'
    >
    <img id="indicator" class="htmx-indicator" src="/Static/spinner.svg" alt="Carregando..."/>
</div>

<div id="lista">

    <ul>
        {% for aluno in alunos %}
            <li>{{ aluno.id }} {{ aluno.nome }}</li>
        {% else %}
            <li>Não há alunos</li>
        {% endfor %}
    </ul>

    <div>
        <button
            hx-get="/lista"
            hx-target="#lista"
            hx-select="#lista"
            hx-include="[name='busca']"
            hx-vals='{"pagina": {{ pagina - 1 }}, "limite": {{ limite }} }'
            {% if comeco_lista %} disabled {% endif %}
        >
            Anterior
        </button>

        <button
            hx-get="/lista"
            hx-target="#lista"
            hx-select="#lista"
            hx-include="[name='busca']"
            hx-vals='{"pagina": {{ pagina + 1 }}, "limite": {{ limite }} }'
            {% if final_lista %} disabled {% endif %}
        >
            Próximo
        </button>

    </div>

</div>
